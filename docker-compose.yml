services:
  dev:
    build: .
    volumes:
      - .:/app
    env_file:
      - ./.env.dev
    command: npm run dev

  test:
    build: .
    command: npm run test


  test-coverage:
    build: .
    command: npm run test:coverage

  lint:
    build: .
    command: npm run lint

  prod:
    build: .
    command: bash -c "npm run build ; npm run start"
    env_file:
      - ./.env.prod
